databases:
  - name: courseweaver-db
    plan: free
    databaseName: courseweaver
    user: courseweaver

services:
  - type: web
    name: courseweaver-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: courseweaver-db
          property: connectionURI
      - key: CORS_ORIGINS
        value: "*"
      - key: GEMINI_API_KEY
        sync: false
